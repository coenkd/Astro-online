# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: NLT module Astrobiologie
author: Coen Klein Douwel
logo: logo.jpg

sphinx:
  language: nl
  locale_dirs: [
    "/home/coen/jupyterbook_env/lib/python3.12/site-packages/sphinx_book_theme/locale"
  ]
  config:
    templates_path: ["_templates"]


copyright: '2025' 

baseurl: https://coenkd.github.io/Astro-online/

parse:
  myst_enable_extensions:
    - amsmath
    - dollarmath

execute:
  execute_notebooks: force

latex:   
  latex_documents:
    targetname: book.tex
packages:
    - mhchem
    - chemfig
preamble: |
    \usepackage[version=4]{mhchem}
    \usepackage{chemfig}

bibtex_bibfiles:
  - references.bib

repository:
  url: https://github.com/executablebooks/jupyter-book
  path_to_book: docs
  branch: master

html:
  use_issues_button: true
  use_repository_button: true
  theme: sphinx_book_theme
  mathjax_config:
    TeX:
      equationNumbers: { autoNumber: "AMS" }
  extra_css:
    - _static/custom.css
  extra_footer: |
   <img src="_static/cc.svg" alt="BY" style="height:1em; vertical-align:middle;"><img src="_static/by.svg" alt="BY" style="height:1em; vertical-align:middle;">
  extra_templates:
    - components/prev-next.html



